[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Map the same path the dev proxy uses, so client code is unchanged.
[[redirects]]
  from = "/api/marco"
  to = "/.netlify/functions/marco"
  status = 200

[[redirects]]
  from = "/api/tts"
  to = "/.netlify/functions/tts"
  status = 200
